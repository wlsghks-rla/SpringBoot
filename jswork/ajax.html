<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ajax.html</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div>
      <form id="frm">
        <input id="title" />
        <input id="body" />
        <button type="button" id="btnsave">등록</button>
      </form>
    </div>
    <div id="result">dddd</div>
    <script>
      $("#btnsave").on("click", (e) => {
        fetch("https://jsonplaceholder.typicode.com/posts", {
          method: "POST",
          body: JSON.stringify({
            title: $("#title").val(),
            body: $("#body").val(),
            userId: 1,
          }),
          headers: {
            "Content-type": "application/json; charset=UTF-8",
          },
        })
          .then((response) => response.json())
          .then((json) => {
            console.log(json);
            $("#result").prepend(
              `<div><button data-id="${element.id}" type="button" id="btnDel">x</button>${json.id}.${json.title}</div>`,
            );
          });
      });

      fetch("https://jsonplaceholder.typicode.com/posts")
        .then((response) => response.json())
        .then((json) => {
          console.log(json);
          json.forEach((element) => {
            $("#result").append(
              `<div>
                <button data-id="${element.id}" type="button" id="btnDel">x</button>
                ${element.id},${element.title}
              </div>`,
            );
          });
        });

      // 삭제버튼 클릭이벤트
      $("#result").on("click", "#btnDel", (e) => {
        // #btnDel -> button가능
        let id = $(e.target).data("id");
        fetch(`https://jsonplaceholder.typicode.com/posts/${id}`, {
          method: "DELETE",
        })
          .then((res) => res.json())
          .then((json) => {
            console.log(json);
            $(e.target).parent().remove();
          });
      });
    </script>
  </body>
</html>
