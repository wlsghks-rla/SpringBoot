<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1>게시글 상세보기</h1>

    <div id="reply"></div>
  </body>
  <script>
    const bno = 2;
    fetch(`/api/board/${bno}/reply`)
      .then((response) => response.json())
      .then((json) => {
        console.log(json);

        json.forEach((elem) => {
          $("#reply").append(
            `<div>작성자 : ${elem.reply} <br> 날짜 : ${elem.replydate}</div>`,
          );
        });
      });
  </script>
</html>
