<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="result">
    <img src="/test.png" width="300">
    </div>
    
    <script>
      fetch("http://127.0.0.1:8080/ex5")
        .then((response) => response.json())
        .then((json) => {
          console.log(json);

          json.forEach((elem) => {
            $("#result").append(`<div>${elem.regDate} ${elem.username}</div>`);
          });
        });
    </script>
  </body>
</html>
