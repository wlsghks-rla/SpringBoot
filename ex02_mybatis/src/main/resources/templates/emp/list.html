<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>list.html</title>
<style>
  .red {color: red;}
  .back {background-color: gray;}
</style>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <h1>사원조회</h1>
  <table border="1" class="mb-2">
	  <thead>
	      <tr>
	      <th>no</th>
	      <th>emplyeeId</th>
	      <th>firstName</th>
	      <th>salary</th>
	      <th>hireDate</th>
	      <th>입사년도</th>
	    </tr>
	  </thead>
	  <tbody>
	    <tr th:each="emp : ${list}" th:class="${empStat.even} ? 'back':''">
	      <td th:text="${empStat.count}">1</td>
	      <td>[[${emp.employeeId}]]</td>
	      <td><a th:href="@{/emp/info/{id}(id=${emp.employeeId})}" th:text="|${emp.firstName} ${emp.lastName}|">Scott King</a></td> 
	      <td th:text="${#numbers.formatInteger(emp.salary,3,'COMMA')}" th:class="${emp.salary}<=10000 ? 'red' : ''">2,700</td>
	      <td th:text="${#dates.format(emp.hireDate, 'yyyy/MM/dd')}">2010/10/10</td>
	      <td th:text="${#dates.year(emp.hireDate)}">2010</td>
	    </tr>
	  </tbody>
  </table>
  <button type="button" class="btn btn-primary"><a th:href="@{/emp/register}" class="link-light link-offset-2 link-underline-opacity-0">등록</a></button>
</body>
</html>
