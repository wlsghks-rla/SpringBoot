<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head>
<meta charset="UTF-8">
<title>list.html</title>

<style>
.error { color:red;}
.col-2 {
  background-color: yellow;
}
</style>
</head>
<body>
<div layout:fragment="content">
	<h1>도서등록</h1>
	<div class="container-sm">
		<div class="card border-secondary" th:object="${book}">
		<form method="post" th:action="@{/book/register}" enctype="multipart/form-data" style="background-color: #80c87d;">
		  <div class="card-body">
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">도서번호</div>
			    <div class="col-10  fw-bold"><input th:field="*{bookNo}"></div>
			  </div>
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">도서명</div>
			    <div class="col-10 fw-bold"><input th:field="*{bookName}">
			      <div
					  class="error"
					  th:if="${#fields.hasErrors('bookName')}"
					  th:errors="*{bookName}"
					></div>
			    </div>
			  </div>
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">도서표지</div>	
			    <div class="col-10  fw-bold"><input th:field="*{bookCoverimg}"></div>		    
			  </div>			  
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">출판일자</div>	
			    <div class="col-10  fw-bold"><input th:field="*{bookDate}"></div>			    
			  </div>
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">금액</div>
			    <div class="col-10 fw-bold"><input th:field="*{bookPrice}"></div>
			  </div>		  			  
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">출판사</div>
			    <div class="col-10 fw-bold"><input th:field="*{bookPublisher}"></div>
			  </div>	
			  <div class="row border-bottom">
			    <div class="col-2">도서소개</div>
			    <div class="col-10 fw-bold"><textarea th:field="*{bookInfo}"></textarea></div>
			  </div>
			  <div class="row mb-2 border-bottom">
			    <div class="col-2">첨부파일</div>
			    <div class="col-10 fw-bold">
			      <input type="file" name="file">	     
			    </div>
			  </div>	  
		  </div>	
		<div>
		  <button type="submit" class="btn btn-primary">등록</button>
		  <button type="button" class="btn btn-danger"><a href="/book/list" class="link-light link-offset-2 link-underline-opacity-0">조회</a></button>
		</div>
		</form>
		</div>
	</div>  
</div>
</body>
</html>
